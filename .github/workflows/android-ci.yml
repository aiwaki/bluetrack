name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Lint Kotlin (ktlint)
        run: ./gradlew :app:ktlintCheck

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Assemble release APK (R8 minify, with ProGuard keep rules)
        run: ./gradlew assembleRelease

      - name: Verify BouncyCastle + Bluetrack protocol classes survived R8
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          test -f "$apk"
          # Collect every classes*.dex out of the APK and grep symbols.
          tmp="$(mktemp -d)"
          unzip -j -q "$apk" 'classes*.dex' -d "$tmp"
          for sym in rfc7748 rfc8032 FeedbackSession FeedbackHandshakePayload PayloadDecryptor TrustedHostStore; do
            if ! strings -a "$tmp"/classes*.dex | grep -q "$sym"; then
              echo "FAIL: '$sym' not found in any classes*.dex of $apk"
              exit 1
            fi
            echo "ok  '$sym' present"
          done
          rm -rf "$tmp"
