name: Host CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: macos-latest

    defaults:
      run:
        working-directory: host/macos-hid-inspector

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --find swift

      - name: Build SwiftPM package
        run: swift build

      - name: Run XCTest target
        run: swift test

      - name: Run inline selftest binary
        run: swift run bluetrack-hid-inspector selftest
